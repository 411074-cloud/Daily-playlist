<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂推薦網</title>
    <style>
        /* CSS 樣式設計 */
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #1db954; /* 經典音樂風綠色 */
            --accent-hover: #1ed760;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        /* 影片容器：保持 16:9 比例 */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 下方控制區 */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .url-display {
            font-size: 0.9rem;
            color: #aaa;
            word-break: break-all;
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .url-display a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .url-display a:hover {
            text-decoration: underline;
        }

        /* 按鈕樣式 */
        .btn-next {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3);
        }

        .btn-next:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        .btn-next:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 音樂風格隨機推薦</h1>
        
        <div class="video-container">
            <div id="player"></div>
        </div>

        <div class="controls">
            <div class="url-display">
                YouTube 網址：<a id="video-link" href="#" target="_blank">載入中...</a>
            </div>
            <button class="btn-next" id="next-btn">下一首 ⏭️</button>
        </div>
    </div>

    <script>
        // 1. 準備你的音樂 YouTube 影片 ID 清單 (可以自由新增、分類)
        const musicPlaylist = [
            'dQw4w9WgXcQ', // 範例音樂 1
            '9bZkp7q19f0', // 範例音樂 2
            'kJQP7kiw5Fk', // 範例音樂 3
            'lTRiuFIWV54', // 範例音樂 4
            'V1Pl8CzNzCw'  // 範例音樂 5
        ];

        let player;
        let currentVideoId = '';

        // 2. 非同步載入 YouTube Iframe API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 3. API 載入完成後會自動呼叫此函式建立播放器
        function onYouTubeIframeAPIReady() {
            // 初始隨機挑一首
            currentVideoId = getRandomVideoId();
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: currentVideoId,
                playerVars: {
                    'playsinline': 1,
                    'autoplay': 0, // 是否自動播放
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });

            updateUrlDisplay(currentVideoId);
        }

        function onPlayerReady(event) {
            // 播放器準備就緒後，綁定「下一首」按鈕事件
            document.getElementById('next-btn').addEventListener('click', changeToNextVideo);
        }

        // 4. 隨機抽選影片 ID 的邏輯
        function getRandomVideoId() {
            // 如果只有一首歌就直接回傳
            if (musicPlaylist.length <= 1) return musicPlaylist[0];
            
            let newId = currentVideoId;
            // 確保連續點擊時，不會抽到跟上一首一模一樣的歌
            while (newId === currentVideoId) {
                const randomIndex = Math.floor(Math.random() * musicPlaylist.length);
                newId = musicPlaylist[randomIndex];
            }
            return newId;
        }

        // 5. 切換到下一首影片
        function changeToNextVideo() {
            currentVideoId = getRandomVideoId();
            
            // 載入並播放新影片
            player.loadVideoById(currentVideoId);
            
            // 更新下方的網址顯示
            updateUrlDisplay(currentVideoId);
        }

        // 6. 更新網址顯示文字與超連結
        function updateUrlDisplay(id) {
            const fullUrl = `https://www.youtube.com/watch?v=${id}`;
            const linkElement = document.getElementById('video-link');
            linkElement.href = fullUrl;
            linkElement.textContent = fullUrl;
        }
    </script>
</body>
</html>
