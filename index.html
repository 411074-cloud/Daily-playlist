<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂推薦網</title>
    <style>
        /* CSS 樣式設計 */
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #1db954; /* 經典音樂風綠色 */
            --accent-hover: #1ed760;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        /* 影片容器：保持 16:9 比例 */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 下方控制區 */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .url-display {
            font-size: 0.9rem;
            color: #aaa;
            word-break: break-all;
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .url-display a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .url-display a:hover {
            text-decoration: underline;
        }

        /* 按鈕樣式 */
        .btn-next {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3);
        }

        .btn-next:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        .btn-next:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 音樂風格隨機推薦</h1>
        
        <div class="video-container">
            <div id="player"></div>
        </div>

        <div class="controls">
            <div class="url-display">
                YouTube 網址：<a id="video-link" href="#" target="_blank">載入中...</a>
            </div>
            <div style="display:flex; gap:10px; width:100%; justify-content:center;">
                <button class="btn-next" id="next-btn">下一首 ⏭️</button>
                <button id="save-current-btn" style="background:#444; color:var(--text-color); border:none; padding:12px 20px; border-radius:20px; cursor:pointer;">儲存目前歌曲 💾</button>
            </div>
        </div>
    </div>

    <script>
        // 1. 準備你的音樂 YouTube 影片 ID 清單 (可以自由新增、分類)
        const musicPlaylist = [
            'dQw4w9WgXcQ', // 範例音樂 1
            '9bZkp7q19f0', // 範例音樂 2
            'kJQP7kiw5Fk', // 範例音樂 3
            'lTRiuFIWV54', // 範例音樂 4
            'V1Pl8CzNzCw'  // 範例音樂 5
        ];

        let player;
        let currentVideoId = '';

        // 2. 非同步載入 YouTube Iframe API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 3. API 載入完成後會自動呼叫此函式建立播放器
        function onYouTubeIframeAPIReady() {
            // 初始隨機挑一首
            currentVideoId = getRandomVideoId();
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: currentVideoId,
                playerVars: {
                    'playsinline': 1,
                    'autoplay': 0, // 是否自動播放
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });

            updateUrlDisplay(currentVideoId);
        }

        function onPlayerReady(event) {
            // 播放器準備就緒後，綁定「下一首」按鈕事件
            document.getElementById('next-btn').addEventListener('click', changeToNextVideo);
        }

        // 4. 隨機抽選影片 ID 的邏輯
        function getRandomVideoId() {
            // 如果只有一首歌就直接回傳
            if (musicPlaylist.length <= 1) return musicPlaylist[0];
            
            let newId = currentVideoId;
            // 確保連續點擊時，不會抽到跟上一首一模一樣的歌
            while (newId === currentVideoId) {
                const randomIndex = Math.floor(Math.random() * musicPlaylist.length);
                newId = musicPlaylist[randomIndex];
            }
            return newId;
        }

        // 5. 切換到下一首影片
        function changeToNextVideo() {
            currentVideoId = getRandomVideoId();
            
            // 載入並播放新影片
            player.loadVideoById(currentVideoId);
            
            // 更新下方的網址顯示
            updateUrlDisplay(currentVideoId);
        }

        // 6. 更新網址顯示文字與超連結
        function updateUrlDisplay(id) {
            const fullUrl = `https://www.youtube.com/watch?v=${id}`;
            const linkElement = document.getElementById('video-link');
            linkElement.href = fullUrl;
            linkElement.textContent = fullUrl;
        }

        // ------- 新增歌曲表單功能（前端） -------
        function extractYouTubeId(input) {
            if (!input) return '';
            // 直接為 ID
            if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
            // 嘗試從完整網址擷取 v= 或短網址
            try {
                const url = new URL(input);
                if (url.searchParams.has('v')) return url.searchParams.get('v');
                // youtu.be 短網址
                if (url.hostname.includes('youtu.be')) return url.pathname.slice(1);
            } catch (e) {
                // not a URL
            }
            return '';
        }

        // 建立表單 UI
        const controls = document.querySelector('.controls');
        const formWrap = document.createElement('div');
        formWrap.style.width = '100%';
        formWrap.style.marginTop = '12px';
        formWrap.innerHTML = `
            <div style="text-align:left; background:rgba(255,255,255,0.03); padding:12px; border-radius:8px;">
                <h3 style="margin:0 0 8px 0; font-size:1rem;">新增歌曲到公開清單</h3>
                <label style="display:block; margin-bottom:6px; font-size:0.9rem">YouTube 連結或 ID</label>
                <input id="add-input-url" type="text" placeholder="https://youtu.be/... 或 影片ID" style="width:100%; padding:8px; border-radius:6px; border:1px solid rgba(255,255,255,0.06); margin-bottom:8px; background:transparent; color:inherit" />
                <label style="display:block; margin-bottom:6px; font-size:0.9rem">歌曲名稱（選填）</label>
                <input id="add-input-title" type="text" placeholder="歌曲名稱" style="width:100%; padding:8px; border-radius:6px; border:1px solid rgba(255,255,255,0.06); margin-bottom:8px; background:transparent; color:inherit" />
                <label style="display:block; margin-bottom:6px; font-size:0.9rem">歌手（選填）</label>
                <input id="add-input-artist" type="text" placeholder="歌手" style="width:100%; padding:8px; border-radius:6px; border:1px solid rgba(255,255,255,0.06); margin-bottom:8px; background:transparent; color:inherit" />
                <div style="display:flex; gap:8px;">
                    <button id="add-song-btn" style="flex:1; background:var(--accent-color); border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:600">新增歌曲</button>
                    <div id="add-status" style="align-self:center; color:#aaa; font-size:0.9rem"></div>
                </div>
            </div>
        `;
        controls.appendChild(formWrap);

        document.getElementById('add-song-btn').addEventListener('click', async () => {
            const input = document.getElementById('add-input-url').value.trim();
            const title = document.getElementById('add-input-title').value.trim();
            const artist = document.getElementById('add-input-artist').value.trim();
            const statusEl = document.getElementById('add-status');

            const youtubeId = extractYouTubeId(input);
            if (!youtubeId) {
                statusEl.textContent = '請輸入有效的 YouTube 連結或影片 ID。';
                return;
            }

            const payload = { id: youtubeId, title, artist };

            try {
                statusEl.textContent = '送出中...';
                const resp = await fetch('/add-song', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (resp.ok) {
                    statusEl.textContent = '已送出！謝謝你的貢獻。';
                    // 可選：將 ID 加入本地播放清單
                    if (!musicPlaylist.includes(youtubeId)) musicPlaylist.push(youtubeId);
                } else {
                    statusEl.textContent = '送出失敗：' + (data && data.error ? data.error : resp.statusText);
                }
            } catch (e) {
                statusEl.textContent = '送出發生錯誤：' + e.toString();
            }
            setTimeout(() => { statusEl.textContent = ''; }, 5000);
        });

        // 儲存目前播放的歌曲到後端/Apps Script
        document.getElementById('save-current-btn').addEventListener('click', async () => {
            const statusEl = document.getElementById('add-status');
            if (!currentVideoId) {
                statusEl.textContent = '目前沒有播放中的影片。';
                return;
            }
            // 優先使用表單內輸入的標題/歌手（若有）
            const title = document.getElementById('add-input-title').value.trim();
            const artist = document.getElementById('add-input-artist').value.trim();
            const payload = { id: currentVideoId, title, artist, source: 'current' };

            try {
                statusEl.textContent = '儲存中...';
                const resp = await fetch('/add-song', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (resp.ok) {
                    statusEl.textContent = '已儲存！';
                } else {
                    statusEl.textContent = '儲存失敗：' + (data && data.error ? data.error : resp.statusText);
                }
            } catch (e) {
                statusEl.textContent = '儲存發生錯誤：' + e.toString();
            }
            setTimeout(() => { statusEl.textContent = ''; }, 4000);
        });
    </script>
</body>
</html>
